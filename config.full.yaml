# BCCC-CSE-CIC-IDS-2018 全量训练配置（与默认 config.yaml 保持一致）

data:
  raw_dir: "/root/autodl-tmp/cc-bishe-full/raw"
  processed_dir: "/root/autodl-tmp/cc-bishe-full/processed"
  cache_dir: "/root/autodl-tmp/cc-bishe-full/cache"
  threat_intel_dir: "data/threat_intel"
  test_size: 0.1
  val_size: 0.1
  random_seed: 42
  batch_size: 8192
  num_workers: 0
  file_pattern: "*.csv"
  full_dataset: true
  exclude_patterns: ["*sample*", "*sampled*"]

model:
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 256
  dropout: 0.1
  num_classes: null

training:
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.01
  patience: 10
  checkpoint_dir: "/root/autodl-tmp/cc-bishe-full/checkpoints"
  log_dir: "/root/autodl-tmp/cc-bishe-full/logs"

fusion:
  strategy: "weighted_average"
  alpha: 0.8

threat_intel_api:
  url: "http://127.0.0.1:8000"
  timeout_seconds: 5
  use_search_fallback: true
  cache_ttl_seconds: 3600

agent:
  mode: "rule"
  llm:
    model: "claude-sonnet-4-20250514"
    api_key: ""
    max_tokens: 1024

visualization:
  output_dir: "/root/autodl-tmp/cc-bishe-full/results/figures"
  dpi: 150
  figsize: [10, 8]
